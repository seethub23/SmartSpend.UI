<div class="navbar">

  <!-- Toggle Button -->
  <button class="toggle-btn" (click)="onToggleSidebar()">☰</button>

  <!-- Title -->
  <div class="navbar-left">
    <h2 class="page-title">SmartSpend</h2>
  </div>

  <!-- Right Side -->
  <div class="navbar-right">
    <span class="date">{{ currentDate | date:'MMMM yyyy' }}</span>

    <!-- Notification Bell -->
    <div class="notification-wrapper">
      <button class="notification-btn" (click)="toggleNotifications()">
        🔔
        @if (unreadCount() > 0) {
          <span class="badge">{{ unreadCount() }}</span>
        }
      </button>

      <!-- Notification Dropdown -->
      @if (showNotifications()) {
        <div class="notification-dropdown">

          <div class="notif-header">
            <h4>Notifications</h4>
            @if (unreadCount() > 0) {
              <button (click)="markAllAsRead()">
                Mark all read
              </button>
            }
          </div>

          <div class="notif-list">
            @for (n of notifications(); track n.notificationId) {
              <div class="notif-item"
                [class.unread]="!n.isRead"
                (click)="markAsRead(n.notificationId)">
                <p class="notif-message">{{ n.message }}</p>
                <span class="notif-date">
                  {{ n.createdDate | date:'dd MMM, hh:mm a' }}
                </span>
              </div>
            } @empty {
              <div class="notif-empty">
                No notifications yet! 😊
              </div>
            }
          </div>

        </div>
      }
    </div>

    <div class="avatar">👤</div>
  </div>

</div>
